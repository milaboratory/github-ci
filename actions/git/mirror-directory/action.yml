name: Mirror Directory
author: 'MiLaboratories'
description: |
  Mirror subdirectories to a target repository.

  Pushes a snapshot of the source directories as a single commit on top of
  the target branch. The source repository's history is not replayed;
  each run produces exactly one commit in the target whose message
  carries a `Source-Commit: <sha>` trailer pointing at the source commit
  that produced this snapshot.

  Supports multiple directory pairs via directory-mappings input.
  Syncs tags when triggered by a tag push.

inputs:
  directory-mappings:
    description: |
      Newline-separated list of source:target directory pairs to mirror.
      Example:
        helm/charts/platforma:charts/platforma
        installation/aws:infrastructure/aws
      Takes precedence over source-directory/target-directory when set.
    required: false
    default: ''
  source-directory:
    description: |
      Deprecated: use directory-mappings instead.
      Subdirectory in the source repository to mirror.
    required: false
    default: ''
  target-repository:
    description: |
      Target repository in org/repo format (e.g. milaboratory/platforma-helm).
    required: true
  github-token:
    description: |
      Token with push access to the target repository.
    required: true
  target-directory:
    description: |
      Deprecated: use directory-mappings instead.
      Subdirectory inside the target repository to mirror into.
    required: false
    default: ''
  file-mappings:
    description: |
      Newline-separated list of source:target file pairs to mirror.
      Unlike directory-mappings, these copy individual files.
      Processed after directory-mappings, so can overwrite files from dir sync.
      Example:
        helm/README.md:README.md
        helm/.gitignore.platforma-helm:.gitignore
    required: false
    default: ''
  keep-without-changes:
    description: |
      Newline-separated list of paths in the target repo to preserve
      during sync. These paths will not be pruned even if they are
      absent from the source. Supports both top-level and nested paths.
      For non-root targets, only paths under the target are matched.
      Example:
        .github
        charts/platforma-local
    required: false
    default: ''
  target-branch:
    description: |
      Branch to push to in the target repository. Created if missing.
    required: false
    default: 'main'
  exclude-patterns:
    description: |
      Newline-separated gitignore-style patterns. Matching files are
      excluded from the snapshot and removed from the target if present.
      Patterns are passed to `rsync --exclude` and apply to every mapping.
      Example:
        *.local.yaml
        secrets/
        **/private.env
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Ensure rsync is installed
      shell: bash
      run: |
        set -euo pipefail
        if command -v rsync >/dev/null 2>&1; then
          exit 0
        fi
        echo "rsync not found, installing..."
        if command -v apt-get >/dev/null 2>&1; then
          SUDO=""
          [[ "$(id -u)" -ne 0 ]] && SUDO="sudo"
          ${SUDO} apt-get update -y
          ${SUDO} apt-get install -y --no-install-recommends rsync
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache rsync
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y rsync
        elif command -v yum >/dev/null 2>&1; then
          yum install -y rsync
        else
          echo "::error::rsync is required but no supported package manager (apt/apk/dnf/yum) was found"
          exit 1
        fi

    - name: Clone target repository
      shell: bash
      env:
        TARGET_REPO: https://x-access-token:${{ inputs.github-token }}@github.com/${{ inputs.target-repository }}.git
        TARGET_BRANCH: ${{ inputs.target-branch }}
      run: |
        set -euo pipefail
        if git ls-remote --heads "${TARGET_REPO}" "${TARGET_BRANCH}" | grep -q "${TARGET_BRANCH}"; then
          git clone --depth=1 --branch="${TARGET_BRANCH}" "${TARGET_REPO}" /tmp/_mirror-target
        else
          git clone --depth=1 "${TARGET_REPO}" /tmp/_mirror-target
          git -C /tmp/_mirror-target checkout -b "${TARGET_BRANCH}"
        fi

    - name: Configure git
      shell: bash
      working-directory: /tmp/_mirror-target
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Sync snapshot
      shell: bash
      env:
        MAPPINGS: ${{ inputs.directory-mappings }}
        FILE_MAPPINGS: ${{ inputs.file-mappings }}
        KEEP_PATHS: ${{ inputs.keep-without-changes }}
        SOURCE_DIR: ${{ inputs.source-directory }}
        TARGET_DIR: ${{ inputs.target-directory }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
        EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
      run: |
        set -euo pipefail

        # Build directory pairs from inputs
        PAIRS=()
        if [[ -n "${MAPPINGS}" ]]; then
          while IFS= read -r line; do
            line=$(echo "${line}" | xargs)
            [[ -n "${line}" ]] && PAIRS+=("${line}")
          done <<< "${MAPPINGS}"
        elif [[ -n "${SOURCE_DIR}" && -n "${TARGET_DIR}" ]]; then
          echo "::warning::source-directory/target-directory inputs are deprecated. Use directory-mappings instead."
          PAIRS+=("${SOURCE_DIR}:${TARGET_DIR}")
        else
          echo "::error::Either directory-mappings or both source-directory and target-directory must be set"
          exit 1
        fi

        # Build base rsync flags once; reused for every mapping.
        # --delete + --delete-excluded ensure target = source minus excludes,
        # even on re-syncs where the target already contained excluded files.
        RSYNC_OPTS=(-a --delete --delete-excluded)
        if [[ -n "${EXCLUDE_PATTERNS}" ]]; then
          while IFS= read -r pattern; do
            pattern=$(echo "${pattern}" | xargs)
            [[ -n "${pattern}" ]] && RSYNC_OPTS+=(--exclude="${pattern}")
          done <<< "${EXCLUDE_PATTERNS}"
        fi

        # Parse keep-without-changes paths into KEEP[]. Empty by default.
        KEEP=()
        if [[ -n "${KEEP_PATHS}" ]]; then
          while IFS= read -r kp; do
            kp=$(echo "${kp}" | xargs)
            [[ -n "${kp}" ]] && KEEP+=("${kp}")
          done <<< "${KEEP_PATHS}"
        fi

        for pair in "${PAIRS[@]}"; do
          SRC="${pair%%:*}"
          TGT="${pair#*:}"

          if [[ -z "${SRC}" || -z "${TGT}" || "${SRC}" == "${pair}" ]]; then
            echo "::error::Invalid mapping '${pair}' — expected format 'source:target'"
            exit 1
          fi

          if [[ ! -d "${GITHUB_WORKSPACE}/${SRC}" ]]; then
            echo "::error::source directory '${SRC}' not found in checkout"
            exit 1
          fi

          # Per-mapping rsync opts: extend with `protect` filters for keep-paths
          # that fall under this target. rsync filter paths are relative to the
          # destination root, which is /tmp/_mirror-target/${TGT}.
          # Paths outside the current target are naturally preserved (rsync
          # never touches files outside its destination tree).
          MAPPING_OPTS=("${RSYNC_OPTS[@]}")
          for kp in ${KEEP[@]+"${KEEP[@]}"}; do
            if [[ "${TGT}" == "." ]]; then
              MAPPING_OPTS+=(--filter="P /${kp}")
              echo "  protecting (TGT=.): ${kp}"
            elif [[ "${kp}" == "${TGT}/"* ]]; then
              REL="${kp#${TGT}/}"
              MAPPING_OPTS+=(--filter="P /${REL}")
              echo "  protecting under ${TGT}: ${REL}"
            fi
          done

          DEST="/tmp/_mirror-target/${TGT}"
          mkdir -p "${DEST}"
          rsync "${MAPPING_OPTS[@]}" "${GITHUB_WORKSPACE}/${SRC}/" "${DEST}/"

          git -C /tmp/_mirror-target add -A "${TGT}"
          echo "Synced ${SRC} -> ${TGT}"
        done

        # Process file mappings
        if [[ -n "${FILE_MAPPINGS}" ]]; then
          while IFS= read -r line; do
            line=$(echo "${line}" | xargs)
            [[ -z "${line}" ]] && continue

            SRC="${line%%:*}"
            TGT="${line#*:}"

            if [[ -z "${SRC}" || -z "${TGT}" || "${SRC}" == "${line}" ]]; then
              echo "::error::Invalid file mapping '${line}' — expected format 'source:target'"
              exit 1
            fi

            if [[ ! -f "${GITHUB_WORKSPACE}/${SRC}" ]]; then
              echo "::error::source file '${SRC}' not found in checkout"
              exit 1
            fi

            DEST="/tmp/_mirror-target/${TGT}"
            mkdir -p "$(dirname "${DEST}")"
            cp -a "${GITHUB_WORKSPACE}/${SRC}" "${DEST}"
            git -C /tmp/_mirror-target add "${TGT}"
            echo "Synced file ${SRC} -> ${TGT}"
          done <<< "${FILE_MAPPINGS}"
        fi

        cd /tmp/_mirror-target
        if git diff --cached --quiet; then
          echo "No changes in any synced directories, nothing to push"
          exit 0
        fi

        SOURCE_SUBJECT=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%s' 2>/dev/null || echo "snapshot")
        git commit \
          -m "sync: ${SOURCE_SUBJECT}" \
          -m "Source-Commit: ${GITHUB_SHA}" \
          -m "Source-Ref: ${GITHUB_REF}"
        git push origin "${TARGET_BRANCH}"

    - name: Sync tag
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      working-directory: /tmp/_mirror-target
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        git tag -f "${TAG}"
        git push origin "${TAG}" --force

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        rm -rf /tmp/_mirror-target
