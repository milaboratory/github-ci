# Test mirror-directory in snapshot mode:
#   1. snapshot        — push current source dir, verify one commit + trailer + files
#   2. no-op           — second push with no source change adds no commit
#   3. tag-sync        — snapshot push + tag synced when GITHUB_REF is a tag
#   4. multi-directory — two source:target pairs synced in a single commit
#
# Jobs run sequentially because `-b` (bind mount) shares the workdir.
# All jobs push to throwaway branches on platforma-helm; a final cleanup
# job deletes them.
#
# This file lives next to action.yml but must be run from the pl/ repo
# (the source repo that contains helm/charts/platforma/).
#
# See README.md in this directory for full setup and launch instructions.
#
name: "Test: Helm Sync (mirror-directory)"

on:
  push:
    branches: ["main"]
    paths: ["helm/**"]

env:
  TARGET_REPO: milaboratory/platforma-helm
  SOURCE_DIR: helm/charts/platforma
  TARGET_DIR: charts/platforma

jobs:
  # ──────────────────────────────────────────────
  # Test 1: Snapshot push — one commit, trailer, files
  # ──────────────────────────────────────────────
  snapshot:
    runs-on: dev-ci-pl
    env:
      TARGET_BRANCH: _test-sync-snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          source-directory: ${{ env.SOURCE_DIR }}
          target-directory: ${{ env.TARGET_DIR }}
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}

      - name: Verify snapshot sync
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Test 1: snapshot ==="

          git clone --branch="${TARGET_BRANCH}" \
            "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/_verify
          cd /tmp/_verify

          # The snapshot mode pushes exactly one commit per invocation.
          LAST_MSG=$(git log -1 --format='%B')
          echo "Last commit message:"
          echo "${LAST_MSG}"
          echo ""

          TRAILER_SHA=$(echo "${LAST_MSG}" | grep -oP '^Source-Commit:\s*\K[0-9a-f]+' | tail -1 || true)
          if [[ "${TRAILER_SHA}" == "${GITHUB_SHA}" ]]; then
            echo "  ✓ Source-Commit trailer matches GITHUB_SHA"
          else
            echo "FAIL: trailer '${TRAILER_SHA}' != GITHUB_SHA '${GITHUB_SHA}'"
            exit 1
          fi

          for F in templates/test-configmap.yaml templates/test-secret.yaml Chart.yaml; do
            if [[ ! -f "${TARGET_DIR}/${F}" ]]; then
              echo "FAIL: missing file ${TARGET_DIR}/${F}"
              exit 1
            fi
            echo "  ✓ file exists: ${F}"
          done

          if grep -q "sync test" "${TARGET_DIR}/Chart.yaml"; then
            echo "  ✓ Chart.yaml description updated"
          else
            echo "FAIL: Chart.yaml description not updated"
            exit 1
          fi

          echo "=== PASSED ==="
          rm -rf /tmp/_verify

  # ──────────────────────────────────────────────
  # Test 2: No-op re-sync — second run adds no commit
  # ──────────────────────────────────────────────
  no-op:
    needs: [snapshot]
    runs-on: dev-ci-pl
    env:
      TARGET_BRANCH: _test-sync-no-op
    steps:
      - uses: actions/checkout@v4

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          source-directory: ${{ env.SOURCE_DIR }}
          target-directory: ${{ env.TARGET_DIR }}
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}

      - name: Snapshot target SHA after first sync
        id: after-first
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          SHA=$(git ls-remote "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
                "refs/heads/${TARGET_BRANCH}" | awk '{print $1}')
          echo "first-sha=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "First-sync target SHA: ${SHA}"

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          source-directory: ${{ env.SOURCE_DIR }}
          target-directory: ${{ env.TARGET_DIR }}
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}

      - name: Verify no new commit on re-sync
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
          FIRST_SHA: ${{ steps.after-first.outputs.first-sha }}
        run: |
          set -euo pipefail
          echo "=== Test 2: no-op ==="

          SECOND_SHA=$(git ls-remote "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
                       "refs/heads/${TARGET_BRANCH}" | awk '{print $1}')
          echo "Second-sync target SHA: ${SECOND_SHA}"

          if [[ "${FIRST_SHA}" == "${SECOND_SHA}" ]]; then
            echo "  ✓ target HEAD unchanged after no-op re-sync"
          else
            echo "FAIL: HEAD moved from ${FIRST_SHA} to ${SECOND_SHA} despite identical source"
            exit 1
          fi

          echo "=== PASSED ==="

  # ──────────────────────────────────────────────
  # Test 3: Snapshot + tag sync
  # ──────────────────────────────────────────────
  tag-sync:
    needs: [no-op]
    runs-on: dev-ci-pl
    env:
      TARGET_BRANCH: _test-sync-tag
      TEST_TAG: v99.0.0-sync-test
    steps:
      - uses: actions/checkout@v4

      - name: Create source tag
        run: git tag -f "${{ env.TEST_TAG }}"

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          source-directory: ${{ env.SOURCE_DIR }}
          target-directory: ${{ env.TARGET_DIR }}
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}
        env:
          GITHUB_REF: refs/tags/${{ env.TEST_TAG }}

      - name: Verify tag sync
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Test 3: tag-sync ==="

          REPO_URL="https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          git clone --branch="${TARGET_BRANCH}" "${REPO_URL}" /tmp/_verify
          cd /tmp/_verify

          LAST_MSG=$(git log -1 --format='%B')
          TRAILER_SHA=$(echo "${LAST_MSG}" | grep -oP '^Source-Commit:\s*\K[0-9a-f]+' | tail -1 || true)
          if [[ "${TRAILER_SHA}" == "${GITHUB_SHA}" ]]; then
            echo "  ✓ Source-Commit trailer matches GITHUB_SHA"
          else
            echo "FAIL: trailer '${TRAILER_SHA}' != GITHUB_SHA '${GITHUB_SHA}'"
            exit 1
          fi

          for F in templates/test-configmap.yaml templates/test-secret.yaml Chart.yaml; do
            if [[ ! -f "${TARGET_DIR}/${F}" ]]; then
              echo "FAIL: missing file ${TARGET_DIR}/${F}"
              exit 1
            fi
            echo "  ✓ file exists: ${F}"
          done

          if git ls-remote --tags origin "${TEST_TAG}" | grep -q "${TEST_TAG}"; then
            echo "  ✓ tag ${TEST_TAG} exists on target remote"
          else
            echo "FAIL: tag ${TEST_TAG} not found on target"
            exit 1
          fi

          git fetch origin "refs/tags/${TEST_TAG}:refs/tags/${TEST_TAG}"
          BRANCH_TREE=$(git rev-parse HEAD^{tree})
          TAG_TREE=$(git rev-parse "${TEST_TAG}^{tree}")
          if [[ "${BRANCH_TREE}" == "${TAG_TREE}" ]]; then
            echo "  ✓ tag tree matches branch HEAD tree"
          else
            echo "FAIL: tag tree (${TAG_TREE}) != branch tree (${BRANCH_TREE})"
            exit 1
          fi

          echo "=== PASSED ==="
          rm -rf /tmp/_verify

      - name: Cleanup local tag
        if: always()
        run: git tag -d "${{ env.TEST_TAG }}" 2>/dev/null || true

  # ──────────────────────────────────────────────
  # Test 4: Multi-directory mapping — two pairs in one commit
  # ──────────────────────────────────────────────
  multi-directory:
    needs: [tag-sync]
    runs-on: dev-ci-pl
    env:
      TARGET_BRANCH: _test-sync-multi
    steps:
      - uses: actions/checkout@v4

      - name: Create second source directory
        run: |
          mkdir -p installation/aws
          echo "cfn-test-content" > installation/aws/cloudformation-test.yaml

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          directory-mappings: |
            helm/charts/platforma:charts/platforma
            installation/aws:infrastructure/aws
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}

      - name: Verify multi-directory sync
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Test 4: multi-directory ==="

          git clone --branch="${TARGET_BRANCH}" \
            "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/_verify
          cd /tmp/_verify

          # Verify helm chart files synced
          if [[ ! -f "charts/platforma/Chart.yaml" ]]; then
            echo "FAIL: missing charts/platforma/Chart.yaml"
            exit 1
          fi
          echo "  ✓ charts/platforma/Chart.yaml exists"

          # Verify CFN files synced
          if [[ ! -f "infrastructure/aws/cloudformation-test.yaml" ]]; then
            echo "FAIL: missing infrastructure/aws/cloudformation-test.yaml"
            exit 1
          fi
          echo "  ✓ infrastructure/aws/cloudformation-test.yaml exists"

          if [[ "$(cat infrastructure/aws/cloudformation-test.yaml)" == "cfn-test-content" ]]; then
            echo "  ✓ CFN file content matches"
          else
            echo "FAIL: CFN file content mismatch"
            exit 1
          fi

          # Verify both directories landed in a single commit
          COMMIT_COUNT=$(git log --oneline "${TARGET_BRANCH}" | wc -l | tr -d ' ')
          # Branch was freshly created, so expect exactly 1 sync commit
          # (plus the initial commit from the clone base)
          LAST_MSG=$(git log -1 --format='%B')
          echo "Last commit:"
          echo "${LAST_MSG}"

          TRAILER_SHA=$(echo "${LAST_MSG}" | grep -oP '^Source-Commit:\s*\K[0-9a-f]+' | tail -1 || true)
          if [[ "${TRAILER_SHA}" == "${GITHUB_SHA}" ]]; then
            echo "  ✓ Source-Commit trailer present — single commit for both dirs"
          else
            echo "FAIL: trailer '${TRAILER_SHA}' != GITHUB_SHA '${GITHUB_SHA}'"
            exit 1
          fi

          # Verify both dirs are in the same commit's changed files
          CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
          if echo "${CHANGED}" | grep -q "^charts/platforma/" && \
             echo "${CHANGED}" | grep -q "^infrastructure/aws/"; then
            echo "  ✓ both directories changed in the same commit"
          else
            echo "FAIL: expected both directories in one commit, got:"
            echo "${CHANGED}"
            exit 1
          fi

          echo "=== PASSED ==="
          rm -rf /tmp/_verify

  # ──────────────────────────────────────────────
  # Test 5: Root mapping with keep-without-changes
  # ──────────────────────────────────────────────
  root-mapping:
    needs: [multi-directory]
    runs-on: dev-ci-pl
    env:
      TARGET_BRANCH: _test-sync-root
    steps:
      - uses: actions/checkout@v4

      - name: Pre-populate target with protected .github dir
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          git clone --depth=1 "${REPO_URL}" /tmp/_setup
          cd /tmp/_setup
          git checkout -b "${TARGET_BRANCH}"

          mkdir -p .github/workflows
          cat > .github/workflows/publish.yaml << 'YAML'
          name: test-publish
          on: push
          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - run: echo "protected workflow"
          YAML

          git add .github/
          git -c user.name=test -c user.email=test@test commit -m "setup: add protected .github"
          git push origin "${TARGET_BRANCH}"
          rm -rf /tmp/_setup

      - uses: milaboratory/github-ci/actions/git/mirror-directory@v4
        with:
          target-repository: ${{ env.TARGET_REPO }}
          directory-mappings: |
            helm/:.
          keep-without-changes: |
            .github
          github-token: ${{ secrets.HELM_SYNC_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}

      - name: Verify root sync + keep-without-changes
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Test 5: root-mapping + keep-without-changes ==="

          git clone --branch="${TARGET_BRANCH}" \
            "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/_verify
          cd /tmp/_verify

          # Verify helm chart synced to root
          if [[ ! -f "charts/platforma/Chart.yaml" ]]; then
            echo "FAIL: missing charts/platforma/Chart.yaml"
            exit 1
          fi
          echo "  ✓ charts/platforma/Chart.yaml exists at root"

          # Verify .github was preserved (not deleted by prune)
          if [[ ! -f ".github/workflows/publish.yaml" ]]; then
            echo "FAIL: .github/workflows/publish.yaml was pruned"
            exit 1
          fi
          echo "  ✓ .github/workflows/publish.yaml preserved"

          # Verify Source-Commit trailer
          LAST_MSG=$(git log -1 --format='%B')
          TRAILER_SHA=$(echo "${LAST_MSG}" | grep -oP '^Source-Commit:\s*\K[0-9a-f]+' | tail -1 || true)
          if [[ "${TRAILER_SHA}" == "${GITHUB_SHA}" ]]; then
            echo "  ✓ Source-Commit trailer matches"
          else
            echo "FAIL: trailer '${TRAILER_SHA}' != GITHUB_SHA '${GITHUB_SHA}'"
            exit 1
          fi

          echo "=== PASSED ==="
          rm -rf /tmp/_verify

  # ──────────────────────────────────────────────
  # Cleanup: delete all throwaway branches and tags
  # ──────────────────────────────────────────────
  cleanup:
    runs-on: dev-ci-pl
    needs: [snapshot, no-op, tag-sync, multi-directory, root-mapping]
    if: always()
    steps:
      - name: Delete test branches and tags
        shell: bash
        env:
          TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          for BRANCH in _test-sync-snapshot _test-sync-no-op _test-sync-tag _test-sync-multi _test-sync-root; do
            if git ls-remote --heads "${REPO}" "${BRANCH}" | grep -q "${BRANCH}"; then
              git push "${REPO}" --delete "${BRANCH}" && echo "✓ deleted branch ${BRANCH}" || true
            fi
          done

          TAG="v99.0.0-sync-test"
          if git ls-remote --tags "${REPO}" "${TAG}" | grep -q "${TAG}"; then
            git push "${REPO}" --delete "${TAG}" && echo "✓ deleted tag ${TAG}" || true
          fi

          echo "Cleanup done."
