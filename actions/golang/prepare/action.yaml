name: Prepare environment for building a Golang application
author: 'MiLaboratories'
description: |
  Prepare environment: install specific version of Golang, restore cache for modules.

inputs:
  golang-version:
    description: |
      Go version to use.
      Examples: '1.19', '1.20'
    required: true

  cache-version:
    description: |
      Simple hack, that allows to 'reset' cache for particular job.

      Just change the value of this parameter and the next run will
      not find build cache and will have to start from scratch.

    required: false
    default: 'v1'

  cache-dependency-path:
    description: |
      Used to specify the path to a dependency file,
      the path should be relative to the GITHUB_WORKSPACE.
    required: false
    default: 'go.work.sum'

  cache-dependency-hashfiles-path:
    description: |
      Returns a single hash for the set of files that matches the path pattern.
      You can provide a single path pattern or multiple path patterns separated by commas.
      The path is relative to the GITHUB_WORKSPACE directory
      and can only include files inside of the GITHUB_WORKSPACE.
    required: false
    default: '**/go.work.sum'

  cache-enabled-in-setup-go:
    description: |
      Set to true, if you'd like to enable caching in setup-go action.
    required: false
    default: 'false'

  cache-save-always:
    description: |
      Run the post step to save the cache even if another step before fails.
    required: false
    default: 'true'

  cache-backend:
    description: "Cache backend: 'github' (default) or 's3'. Passed to golang/cache."
    required: false
    default: 'github'
  s3-endpoint:
    description: "S3 endpoint (cache-backend=s3)."
    required: false
    default: ''
  s3-bucket:
    description: "S3 bucket (cache-backend=s3)."
    required: false
    default: ''
  s3-region:
    description: "S3 region (cache-backend=s3)."
    required: false
    default: 'us-east-1'
  s3-insecure:
    description: "Plain HTTP to the S3 endpoint (cache-backend=s3)."
    required: false
    default: 'false'
  s3-access-key:
    description: "S3 access key (cache-backend=s3; masked secret)."
    required: false
    default: ''
  s3-secret-key:
    description: "S3 secret key (cache-backend=s3; masked secret)."
    required: false
    default: ''

runs:
  using: "composite"

  steps:
    - name: Install Golang ${{ inputs.golang-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.golang-version }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
        cache: ${{ inputs.cache-enabled-in-setup-go }}

    - name: Setup Cache for Golang project
      # Pinned to the hz-s3-cache branch so the s3 backend is available; folds
      # back to @v4 on merge.
      uses: milaboratory/github-ci/actions/golang/cache@feat/hz-s3-cache-actions
      with:
        cache-version: ${{ inputs.cache-version }}
        cache-dependency-hashfiles-path: ${{ inputs.cache-dependency-hashfiles-path }}
        cache-save-always: ${{ inputs.cache-save-always }}
        cache-backend: ${{ inputs.cache-backend }}
        s3-endpoint: ${{ inputs.s3-endpoint }}
        s3-bucket: ${{ inputs.s3-bucket }}
        s3-region: ${{ inputs.s3-region }}
        s3-insecure: ${{ inputs.s3-insecure }}
        s3-access-key: ${{ inputs.s3-access-key }}
        s3-secret-key: ${{ inputs.s3-secret-key }}
