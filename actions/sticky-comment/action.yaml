name: Sticky PR Comment
author: 'MiLaboratories'
description: |
  Create or update a sticky comment on a pull request.
  Uses a hidden HTML marker to find and update existing comments.

inputs:
  header:
    description: |
      Unique identifier for this comment. Multiple sticky comments
      with different headers can coexist on the same PR.
    required: true

  message:
    description: |
      Comment body (markdown). If empty, deletes the existing comment.
    required: false
    default: ''

  github-token:
    description: |
      GitHub token with pull-requests:write permission.
    required: false
    default: ${{ github.token }}

outputs:
  comment-id:
    description: ID of the created or updated comment
    value: ${{ steps.upsert.outputs.comment-id }}

runs:
  using: "composite"
  steps:
    - name: Create or update sticky comment
      id: upsert
      uses: actions/github-script@v7
      env:
        HEADER: ${{ inputs.header }}
        MESSAGE: ${{ inputs.message }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const header = process.env.HEADER;
          const message = process.env.MESSAGE;
          const marker = `<!-- sticky-comment: ${header} -->`;

          const issueNumber = context.issue.number;
          if (!issueNumber) {
            core.warning('Not a pull request context, skipping');
            return;
          }

          // Find existing comment by marker
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            per_page: 100,
          });

          const existing = comments.find(c => c.body.includes(marker));

          // Delete mode: empty message removes the comment
          if (!message) {
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
              core.info(`Deleted comment ${existing.id}`);
            }
            return;
          }

          const body = `${marker}\n${message}`;

          if (existing) {
            const { data: updated } = await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
            core.setOutput('comment-id', updated.id);
            core.info(`Updated comment ${updated.id}`);
          } else {
            const { data: created } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
            core.setOutput('comment-id', created.id);
            core.info(`Created comment ${created.id}`);
          }
